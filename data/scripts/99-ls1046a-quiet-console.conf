# FULL DEBUG MODE — keep kernel console at maximum verbosity.
#
# Bootargs already set `debug ignore_loglevel` (see boot.cmd /
# vyos-postinstall UBOOT_BOOTARGS_TAIL), so the console prints every
# printk including KERN_DEBUG. This sysctl drop-in is kept as a
# placeholder and explicitly reaffirms that nothing is quieted
# after userspace comes up.
#
# printk format: console_loglevel default_message_loglevel min_console_loglevel default_default
#   8 = KERN_DEBUG — everything reaches the console
#   4 = default loglevel for messages without an explicit level
#   1 = minimum loglevel that can ever be set on the console
#   7 = boot-time default
#
# To re-enable the post-userspace quiet behaviour later (suppress the
# NXP SDK fsl_dpa "phy device not initialized" pr_err spam at T+62s
# so it doesn't bury the login banner), change the first number to 4.
kernel.printk = 8 4 1 7